<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Captura Profissional</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-slate-50 flex flex-col min-h-screen justify-center items-center p-4 font-sans">

<div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100">

    <h1 class="text-3xl font-extrabold text-slate-900 mb-2 text-center">
        Receba nossa Proposta
    </h1>

    <p class="text-slate-500 text-center mb-6">
        Preencha os campos abaixo para falar com um especialista.
    </p>

    <form id="leadForm" class="space-y-4">

        <div>
            <label for="nome" class="block mb-1 font-semibold">
                Nome Completo
            </label>

            <input
                id="nome"
                type="text"
                required
                class="w-full p-3 rounded-xl border border-gray-300"
            >
        </div>

        <div>
            <label for="email" class="block mb-1 font-semibold">
                E-mail
            </label>

            <input
                id="email"
                type="email"
                required
                class="w-full p-3 rounded-xl border border-gray-300"
            >
        </div>

        <div>
            <label for="telefone" class="block mb-1 font-semibold">
                WhatsApp
            </label>

            <input
                id="telefone"
                type="tel"
                required
                class="w-full p-3 rounded-xl border border-gray-300"
            >
        </div>

        <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-bold">
            Enviar Dados
        </button>

    </form>

    <div id="msg" class="hidden mt-4 p-3 rounded-xl text-center"></div>

</div>

<script>

const SUPABASE_URL = "https://ashhrwbhkahwutdzvktk.supabase.co";";
const SUPABASE_KEY = "sb_publishable_Sk4rlwXytfgYOcWNV7BI3w_SZ62uV0F";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const form = document.getElementById("leadForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    msg.classList.remove("hidden");
    msg.className = "mt-4 p-3 rounded-xl text-center bg-blue-100 text-blue-700";
    msg.innerText = "Enviando...";

    const nome = document.getElementById("nome").value;
    const email = document.getElementById("email").value;
    const telefone = document.getElementById("telefone").value;

    const { error } = await db
        .from("pistas")
        .insert([
            {
                nome,
                email,
                telefone
            }
        ]);

    if (error) {

        console.error(error);

        msg.className = "mt-4 p-3 rounded-xl text-center bg-red-100 text-red-700";
        msg.innerText = JSON.stringify(error);

        return;
    }

    msg.className = "mt-4 p-3 rounded-xl text-center bg-green-100 text-green-700";
    msg.innerText = "Cadastro realizado com sucesso!";

    form.reset();

});

</script>

</body>
</html>
