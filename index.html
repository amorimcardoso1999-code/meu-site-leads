<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Captura Profissional</title>
    <!-- Tailwind CSS para um design bonito e moderno -->
    <script src="https://jsdelivr.net"></script>
    <!-- Script Oficial do Supabase -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen justify-center items-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-gray-100">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-2 text-center tracking-tight">Receba nossa Proposta</h1>
        <p class="text-gray-500 text-center mb-6">Preencha os campos abaixo para falar com um especialista.</p>

        <form id="leadForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nome Completo</label>
                <input type="text" id="nome" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">E-mail Corporativo</label>
                <input type="email" id="email" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Telefone / WhatsApp</label>
                <input type="tel" id="telefone" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-blue-200 cursor-pointer">
                Enviar Dados
            </button>
        </form>
        <p id="msg" class="text-center mt-4 text-sm font-medium hidden"></p>
    </div>

    <script>
        // CONFIGURAÇÃO DO SUPABASE
        // Substitua os valores abaixo pelas suas credenciais reais do Supabase
        const SUPABASE_URL = "https://ashhrwbhkahwutdzvktk.supabase.com";
        const SUPABASE_KEY = "sb_publishable_Sk4rlwXytfgYOcWNV7BI3w_SZ62uV0F";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ENVIO DO FORMULÁRIO
        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const telefone = document.getElementById('telefone').value;
            const msgEl = document.getElementById('msg');

            // Inserindo os dados na tabela 'leads' criada no Supabase
            const { data, error } = await supabase
                .from('leads')
                .insert([{ nome, email, telefone }]);

            if (error) {
                msgEl.innerText = "Erro ao enviar dados. Tente novamente.";
                msgEl.className = "text-center mt-4 text-sm font-medium text-red-600";
            } else {
                msgEl.innerText = "Cadastro realizado com sucesso!";
                msgEl.className = "text-center mt-4 text-sm font-medium text-green-600";
                document.getElementById('leadForm').reset();
            }
            msgEl.classList.remove('hidden');
        });
    </script>
</body>
</html>
